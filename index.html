<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENvision</title>
<link rel="icon" type="image/jpeg" href="denvision-logo.jpg">
<style>
  :root{
    --bg:#f5f7fb; --card:#fff; --line:#e6eaf2; --line2:#eef1f7;
    --ink:#10131a; --muted:#6b7384; --faint:#9aa2b2;
    --slate:#0f2746; --slate2:#163356; --slatehover:#1d4170;
    --accent:#1477e1; --accent2:#3b8ef0; --accentsoft:#e7f1fd; --accentdk:#0f5fc0;
    --gold:#febe10; --goldsoft:#fff6da;
    --teal:#0ea5a4; --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --shadow:0 1px 2px rgba(16,24,48,.05),0 4px 16px rgba(16,24,48,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  .app{display:flex;min-height:100vh}
  a{color:var(--accent);text-decoration:none}

  /* sidebar */
  .sidebar{width:228px;flex-shrink:0;background:var(--slate);color:#c3cad9;display:flex;flex-direction:column;
           position:sticky;top:0;height:100vh;border-left:4px solid var(--gold)}
  .brand{padding:20px 18px 16px;font-weight:700;font-size:22px;color:#fff;display:flex;align-items:center;gap:11px;
         border-bottom:1px solid rgba(255,255,255,.07)}
  .brand .nm b{color:#fff;font-weight:700}
  .brand .nm span{color:var(--gold);font-weight:700}
  .brand .dot{width:60px;height:60px;border-radius:12px;background:#fff;padding:7px;
         display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .brand .dot img{width:100%;height:100%;object-fit:contain;display:block}
  .sidebar nav{padding:12px 10px;display:flex;flex-direction:column;gap:3px}
  .sidebar .nav-h{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:#727d96;padding:12px 12px 5px}
  .sidebar button.nav{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;
         border-radius:9px;padding:10px 12px;color:#c3cad9;font-size:14px;font-weight:550;cursor:pointer}
  .sidebar button.nav:hover{background:var(--slatehover);color:#fff}
  .sidebar button.nav.active{background:var(--slate2);color:#fff;box-shadow:inset 3px 0 0 var(--gold)}
  .sidebar button.nav .ic{width:18px;text-align:center;opacity:.9}
  .side-foot{margin-top:auto;padding:14px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:11.5px;color:#6b7488}

  main{flex:1;min-width:0;padding:24px 30px 70px}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  .topbar h1{margin:0;font-size:22px;font-weight:740;letter-spacing:-.2px}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:4px}

  button{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:9px;
         padding:9px 14px;font-size:13px;cursor:pointer;font-weight:560}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accentdk);color:#fff}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  button.ghost:hover{background:var(--accentsoft);color:var(--accent)}
  button.sm{padding:6px 10px;font-size:12px;border-radius:8px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .pad{padding:18px 20px}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);
     font-weight:650;padding:11px 14px;border-bottom:1px solid var(--line)}
  td{padding:12px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafbff}
  tbody tr.ev-edit:hover{background:var(--accentsoft)}

  input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;
        border:1px solid var(--line);border-radius:9px;padding:9px 11px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px var(--accentsoft)}
  label.f{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px}
  .field{margin-bottom:15px}

  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;line-height:1.5}
  .pill.ref{background:var(--accentsoft);color:var(--accentdk)}
  .pill.label{background:#e7f6f5;color:#0e8a89}
  .pill.text,.pill.other{background:#f1f3f8;color:#6b7384}
  .pill.coach{background:var(--goldsoft);color:#8a6500}
  .pill.green{background:#e8f6ed;color:#16834a}
  .pill.gray{background:#f1f3f8;color:#6b7384}

  .logo-cell{width:46px;height:34px;border-radius:7px;border:1px solid var(--line);background:#fafbff center/contain no-repeat;
        display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;font-weight:700;overflow:hidden}
  .logo-cell img{max-width:100%;max-height:100%;display:block}

  .grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:start}
  @media(max-width:920px){.grid2{grid-template-columns:1fr}}

  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:16px}
  .filters .field{margin:0;min-width:150px}
  .check{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:560;color:var(--ink);cursor:pointer;
         padding:9px 0}
  .check input{width:auto}

  /* searchable driver picker */
  .combo{position:relative}
  .combo .menu{position:absolute;z-index:20;top:calc(100% + 4px);left:0;right:0;max-height:260px;overflow:auto;
        background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(16,24,48,.14);display:none}
  .combo.open .menu{display:block}
  .combo .opt{padding:9px 12px;cursor:pointer;font-size:13.5px;border-bottom:1px solid var(--line2)}
  .combo .opt:last-child{border-bottom:none}
  .combo .opt:hover,.combo .opt.hl{background:var(--accentsoft);color:var(--accent)}
  .combo .opt .sub{font-size:11px;color:var(--faint)}
  .combo .empty{padding:11px 12px;color:var(--faint);font-size:12.5px}
  .linkbtn{background:none;border:none;color:var(--accent);font-weight:650;font-size:12px;padding:2px 4px;cursor:pointer}
  .linkbtn:hover{text-decoration:underline;color:var(--accentdk)}
  .opt .tag{float:right;font-size:10px;font-weight:700;color:var(--gold-ink,#8a6500);background:var(--goldsoft);
        border-radius:999px;padding:1px 7px}

  .driver-head{font-weight:700;color:var(--ink);background:#f3f5fb !important}
  .driver-head td{padding:8px 14px;font-size:12.5px;color:var(--slate);letter-spacing:.2px}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .right{text-align:right} .center{text-align:center}
  .empty-state{padding:48px 20px;text-align:center;color:var(--faint)}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--slate);color:#fff;padding:12px 18px;border-radius:11px;
        box-shadow:0 12px 36px rgba(0,0,0,.28);font-size:13.5px;font-weight:560;opacity:0;transform:translateY(8px);
        transition:.22s;z-index:100;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:none}
  .syncbar{position:fixed;top:0;left:0;right:0;background:#b3261e;color:#fff;padding:10px 16px;font-size:13.5px;
        font-weight:560;text-align:center;z-index:200;transform:translateY(-100%);transition:.22s;
        box-shadow:0 4px 18px rgba(0,0,0,.25)}
  .syncbar.show{transform:none}
  .count-chip{font-size:12px;color:var(--muted);background:#f1f3f8;border-radius:999px;padding:3px 10px;font-weight:600}
  .behgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px}
  .behbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;cursor:pointer;
        box-shadow:var(--shadow);transition:border-color .12s,box-shadow .12s;text-align:left}
  .behbox:hover{border-color:var(--accent)}
  .behbox.top3{border-color:var(--gold);box-shadow:0 0 0 2px var(--goldsoft),var(--shadow)}
  .behbox.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accentsoft),var(--shadow)}
  .behbox.top3.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accentsoft),var(--shadow)}
  .behbox.zero{opacity:.5}
  .behbox .n{font-size:26px;font-weight:760;letter-spacing:-.5px;line-height:1}
  .behbox.active .n{color:var(--accent)}
  .behbox .lbl{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .warn{background:#fff8ec;border:1px solid #f3e2c0;color:#9a6a12;border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:16px}

  /* trend chip (customers screen) */
  .trend-chip{display:inline-block;padding:5px 11px;border-radius:8px;background:var(--accentsoft);color:var(--accentdk);
        font-weight:650;font-size:12.5px;cursor:pointer;border:1px solid #cfe2fb;white-space:nowrap}
  .trend-chip:hover{background:#d8e8fd}
  .trend-chip.off{background:#f1f3f8;color:var(--muted);border-color:var(--line)}

  /* trend banner (entry form) */
  .trend-alert{padding:13px 15px;border-radius:11px;font-size:13px;margin:16px 16px 4px;line-height:1.5}
  .trend-alert.hit{background:var(--goldsoft);border:1px solid #f0d98a;color:#7a5800}
  .trend-alert.ok{background:var(--accentsoft);border:1px solid #cfe2fb;color:var(--accentdk)}
  .f2f-alert{margin-top:8px;padding:10px 12px;border-radius:9px;font-size:12.5px;font-weight:650;
    background:#fdecec;border:1px solid #f3b4b4;color:#b3261e;line-height:1.4}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(16,24,48,.45);display:none;align-items:center;justify-content:center;
        z-index:200;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.3);width:100%;max-width:500px;
        padding:22px 24px;max-height:90vh;overflow:auto}
  .modal h2{margin:0 0 4px;font-size:18px;font-weight:720}
  .modal .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .logo-pick{width:96px;height:74px;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;
        justify-content:center;cursor:pointer;padding:8px;background:#fafbff}
  .logo-pick:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentsoft)}
  .logo-pick img{max-width:100%;max-height:100%}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="dot"><img src="denvision-logo.jpg" alt="DENvision"></span> <span class="nm"><b>DEN</b><span>vision</span></span></div>
    <nav>
      <div class="nav-h">Workspace</div>
      <button class="nav" data-screen="customers"><span class="ic">▤</span> Customers</button>
      <button class="nav" data-screen="entry"><span class="ic">＋</span> Data Entry</button>
      <button class="nav" data-screen="events"><span class="ic">≡</span> Events by Behavior</button>
    </nav>
    <div class="side-foot">
      Synergy Solutions · internal<br>
      Data mirrored from Infinity<br>
      <span id="genstamp" class="faint"></span>
    </div>
  </aside>
  <main id="main"></main>
</div>
<div class="syncbar" id="syncbar">⚠ Can't reach the DENvision server — you may be seeing stale data. Check your connection or ad-blocker, then reload the page.</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>

<script src="seed.js?v=41113b58"></script><!-- seed-ver: build_seed.py stamps the md5 here so a new seed always busts stale browser caches -->
<script>
/* ---------- data + state ---------- */
const BUILD_ID='2026-07-13-converge'; // bump every deploy; shown in the sidebar so a browser reveals which HTML it's actually running
const SEED = window.SEED || {boards:[],coaching_types:[]};
const COACHING = ((SEED.coaching_types && SEED.coaching_types.length)
  ? SEED.coaching_types.slice() : ['Coaching Notes','Critical Event','Unidentified Driver'])
  .filter(c=>c!=='Blocked Camera'); // legacy "Blocked Camera" coaching is gone — camera faults are now the "Camera Exception" behavior auto-set to "System Alert"
// Face to Face is the trend-rule outcome; it lives in Infinity and is auto-set when a trend trips (see autoCoaching)
if(!COACHING.includes('Face to Face')){ const i=COACHING.indexOf('Critical Event'); COACHING.splice(i>=0?i+1:COACHING.length,0,'Face to Face'); }
if(!COACHING.includes('System Alert')) COACHING.push('System Alert'); // auto-set when behavior = Camera Exception (camera fault, not a driver coaching)
// the only behaviors allowed for entry (boards in Infinity are being cleaned up to match)
const ENTRY_BEHAVIORS = ['Camera Exception','Driver Distraction-Phone','Driver Distraction-Cab',
  'Drowsy Driving','Following Distance','Hard Brake / Turn','Safety-Critical Event','Sign Violation',
  'Traffic Light Violation','Speeding','U-Turn','Seat Belt'];
// behaviors that trend together as a single group for the face-to-face threshold
const TREND_GROUPS = [['Driver Distraction-Phone','Driver Distraction-Cab']];
function trendKey(behavior){
  const g=TREND_GROUPS.find(grp=>grp.includes(behavior));
  return g?g.join(' + '):(behavior||'');
}
const LS = {
  get s(){ try{return JSON.parse(localStorage.getItem('cam_settings')||'{}')}catch(e){return {}} },
  set s(v){ localStorage.setItem('cam_settings',JSON.stringify(v)) },
  get local(){ try{return JSON.parse(localStorage.getItem('cam_local')||'[]')}catch(e){return []} },
  set local(v){ localStorage.setItem('cam_local',JSON.stringify(v)) },
  get drivers(){ try{return JSON.parse(localStorage.getItem('cam_drivers')||'[]')}catch(e){return []} },
  set drivers(v){ localStorage.setItem('cam_drivers',JSON.stringify(v)) },
  // live per-board pulls from the "Refresh this board" button, keyed by board id.
  // Layered over the static seed on load so a refresh survives a page reload.
  get refreshed(){ try{return JSON.parse(localStorage.getItem('cam_refreshed')||'{}')}catch(e){return {}} },
  set refreshed(v){ localStorage.setItem('cam_refreshed',JSON.stringify(v)) },
  // Infinity item ids of events WE logged through this app (write-back succeeded).
  // Lets us put a green check on "events we've already entered data on" and make
  // them editable — and it survives the refresh-prune of the local queue (and
  // syncs across devices via /state), so the ✓ sticks once the event is mirrored.
  get entered(){ try{return JSON.parse(localStorage.getItem('cam_entered')||'[]')}catch(e){return []} },
  set entered(v){ localStorage.setItem('cam_entered',JSON.stringify(Array.from(new Set(v)))) },
};
// ---- one-time forced convergence ----
// localStorage survives a hard refresh, so a browser that ever hid boards ("edit
// available boards") or cached a now-removed board keeps showing a divergent list
// forever — no server fix reaches it. Bump RESET_VERSION to force EVERY browser to
// drop its per-machine hidden-list + refresh cache once on next load, snapping the
// whole team back to the shared server state (all boards visible). One-time per bump.
const RESET_VERSION='2026-07-13-converge';
try{
  if(localStorage.getItem('cam_reset')!==RESET_VERSION){
    const s=LS.s; s._hidden=[]; LS.s=s;              // stop hiding boards locally
    localStorage.removeItem('cam_refreshed');        // drop resurrected/old boards
    localStorage.removeItem('cam_seed_ver');         // force clean re-seed
    localStorage.setItem('cam_reset',RESET_VERSION);
  }
}catch(e){}
function markEntered(itemId){ if(!itemId) return; const e=LS.entered; if(!e.includes(itemId)){ e.push(itemId); LS.entered=e; pushState(); } }
const boardById = id => SEED.boards.find(b=>b.board===id);
const settingsFor = id => (LS.s[id]||{});
function setSetting(id,patch){ const s=LS.s; s[id]={...(s[id]||{}),...patch}; LS.s=s; pushState(); }
// ---- durable logos: per-id settings orphan when a board leaves & returns with a
// new Infinity id (delete/recreate, rename, rebuild). We ALSO remember each logo
// keyed by normalized customer name so a returning board reloads its logo. ----
const logoKey = id => { const b=boardById(id); return b?normName(b.name):''; };
function logoFor(id){                                  // resolve id-first, then name fallback
  const st=settingsFor(id);
  if(st.logo) return {logo:st.logo, logoZoom:st.logoZoom||1};
  const k=logoKey(id), m=LS.s._logos||{};
  if(k&&m[k]&&m[k].logo) return {logo:m[k].logo, logoZoom:m[k].logoZoom||1};
  return {logo:'', logoZoom:st.logoZoom||1};
}
function setLogoSetting(id,patch){                     // write per-id AND mirror to the name store
  setSetting(id,patch);
  const k=logoKey(id); if(!k) return;
  const st=settingsFor(id), s=LS.s, m={...(s._logos||{})};
  if(st.logo) m[k]={logo:st.logo, logoZoom:st.logoZoom||1}; else delete m[k];
  s._logos=m; LS.s=s; pushState();
}
// boards the user has hidden from the dashboard (manual "edit available boards")
function hiddenSet(){ const h=LS.s._hidden; return new Set(Array.isArray(h)?h:[]); }
function setHidden(ids){ const s=LS.s; s._hidden=Array.from(new Set(ids)); LS.s=s; pushState(); }

/* ---------- shared app-state sync (settings + the event queue) ----------
   Two slices live in the worker's GitHub-backed /state store:
     • settings (LS.s)  — logos, zoom, trend rules, hidden boards
     • local    (LS.local) — entered events not yet mirrored back from Infinity
   Both used to be per-browser only. settings syncing fixed logos-across-devices;
   syncing `local` fixes the worse bug: an event entered on one machine was
   marooned there — invisible everywhere else, and only THAT browser could push
   it to Infinity. Now every entered event is durable server-side the instant
   it's saved, and ANY machine can flush it. We own settings+local and leave the
   rest of the file (board_requests, etc.) intact. server-wins-per-field for
   settings; union-by-event-id for local (sync flags OR'd so a write-back done on
   one machine is known to all — prevents duplicate creation). */
let _appState=null, _appSha=null, _pushTimer=null, _pushing=false, _pushAgain=false;
function mergeSettings(local,server){
  const out={...(local||{})};
  for(const k in (server||{})){
    if(k==='_hidden') out._hidden=server._hidden;
    else if(server[k]&&typeof server[k]==='object') out[k]={...((local&&local[k])||{}),...server[k]};
    else out[k]=server[k];
  }
  return out;
}
// union two event queues by id; if either side has it synced/created, that wins
// (so a board's write-back done on one machine isn't re-attempted by another).
function mergeLocal(a,b){
  const m=new Map();
  for(const e of [...(a||[]),...(b||[])]){
    const prev=m.get(e.id);
    if(!prev){ m.set(e.id,{...e}); continue; }
    const merged={...prev,...e};
    merged.synced = !!(prev.synced||e.synced);
    merged.infItemId = prev.infItemId||e.infItemId||null;
    if(merged.synced) merged.syncError=null;
    m.set(e.id,merged);
  }
  return Array.from(m.values()).sort((x,y)=>(y.ts||0)-(x.ts||0));
}
function syncBar(show){ const b=document.getElementById('syncbar'); if(b) b.classList.toggle('show',!!show); }
async function pullState(){
  try{
    const r=await fetch(API_BASE+'/state',{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json(); _appState=j.data||{}; _appSha=j.sha||null;
    const mergedS=mergeSettings(LS.s,_appState.settings||{});
    const mergedL=mergeLocal(LS.local,_appState.local||[]);
    const mergedE=Array.from(new Set([...(LS.entered||[]),...(_appState.entered||[])]));
    const changed=JSON.stringify(mergedS)!==JSON.stringify(_appState.settings||{})
               || JSON.stringify(mergedL)!==JSON.stringify(_appState.local||[])
               || JSON.stringify(mergedE.slice().sort())!==JSON.stringify((_appState.entered||[]).slice().sort());
    LS.s=mergedS; LS.local=mergedL; LS.entered=mergedE; render();
    syncBar(false); // reached the server — clear any stale-data warning
    if(changed) pushState(true); // promote local-only settings/events up into the shared store
  }catch(e){ syncBar(true); /* offline / unreachable — warn instead of silently showing stale data */ }
}
function pushState(now){ clearTimeout(_pushTimer); _pushTimer=setTimeout(_doPush, now?0:800); }
async function _doPush(){
  if(_pushing){ _pushAgain=true; return; }        // coalesce overlapping pushes
  _pushing=true; _pushAgain=false;
  try{
    if(_appState==null){ const g=await fetch(API_BASE+'/state'); const gj=await g.json(); _appState=gj.data||{}; _appSha=gj.sha||null; }
    const put=async()=>{
      _appState.settings=LS.s; _appState.local=LS.local; _appState.entered=LS.entered; _appState._ts=new Date().toISOString();
      return fetch(API_BASE+'/state',{method:'PUT',
        headers:{'Content-Type':'application/json','X-App-Key':APP_KEY},
        body:JSON.stringify({data:_appState,sha:_appSha})});
    };
    let res=await put();
    if(!res.ok){                                   // stale sha — re-read, RE-MERGE (don't clobber a concurrent queue), retry once
      const g=await fetch(API_BASE+'/state'); const gj=await g.json();
      _appState=gj.data||{}; _appSha=gj.sha||null;
      LS.local=mergeLocal(LS.local,_appState.local||[]);
      LS.entered=Array.from(new Set([...(LS.entered||[]),...(_appState.entered||[])]));
      res=await put();
    }
    if(res.ok){ const jr=await res.json(); if(jr&&jr.sha) _appSha=jr.sha; }
  }catch(e){ /* keep local; next change retries */ }
  finally{ _pushing=false; if(_pushAgain) _doPush(); }
}
function isHidden(id){ return hiddenSet().has(id); }
function toggleHidden(id,hide){ const h=hiddenSet(); hide?h.add(id):h.delete(id); setHidden([...h]); }
// the boards the dashboard actually shows = all known boards minus hidden ones, A–Z

}

// Overlay a freshly pulled board record onto the in-memory SEED board.
function applyBoardRecord(rec){
  if(!rec||!rec.board) return;
  const b=boardById(rec.board);
  if(b){
    if(Array.isArray(rec.drivers)) b.drivers=rec.drivers;
    if(Array.isArray(rec.events)) b.events=rec.events;
    if(Array.isArray(rec.behaviors)&&rec.behaviors.length) b.behaviors=rec.behaviors;
    ['driver_attr','driver_type','attr','camera_folder','roster_folder'].forEach(k=>{ if(rec[k]!=null) b[k]=rec[k]; });
    b._refreshedAt=rec._refreshedAt||b._refreshedAt;
  } else {
    SEED.boards.push(rec);
  }
}
// Re-apply cached refreshes over the static seed so they survive a reload.
// But a freshly rebuilt+deployed seed supersedes older live-refresh snapshots:
// when SEED.generated changes, wipe the cache once so stale snapshots can't shadow
// the new seed (this is what made Mission show blank coaching after the data fix).
function applyRefreshCache(){
  try{
    const ver=String(SEED.generated||'');
    if(ver && localStorage.getItem('cam_seed_ver')!==ver){
      localStorage.removeItem('cam_refreshed');
      localStorage.setItem('cam_seed_ver',ver);
    }
  }catch(e){}
  // Only overlay cached refreshes onto boards that STILL exist in the current seed.
  // A cached record for a board dropped/renamed in a newer seed must NOT be re-added
  // (applyBoardRecord would push it as a "new" board), or that removed board would
  // resurrect on this browser only -> everyone ends up with a different board list.
  // Seed is authoritative for WHICH boards exist; the cache only refreshes their data.
  const cache=LS.refreshed, known=new Set(SEED.boards.map(b=>b.board)); let pruned=false;
  Object.keys(cache).forEach(id=>{
    if(known.has(id)) applyBoardRecord(cache[id]);
    else { delete cache[id]; pruned=true; }
  });
  if(pruned) LS.refreshed=cache;
}
applyRefreshCache();

// Pull one board live from Infinity through the worker, merge, persist, re-render.
async function refreshBoard(bid,opts){
  opts=opts||{};
  const b=boardById(bid); if(!b) return;
  if(!opts.quiet) toast('Refreshing '+b.name+'…');
  let d;
  try{
    const u=API_BASE+'/board-data?board='+encodeURIComponent(bid)
      +'&ws='+encodeURIComponent(b.ws||'')+'&name='+encodeURIComponent(b.name||'');
    const r=await fetch(u,{headers:{'X-App-Key':APP_KEY}});
    d=await r.json();
  }catch(e){ console.error('refresh failed',e); toast('Could not reach the server','⚠'); return; }
  if(!d||!d.ok||!d.board){ toast('Refresh failed'+(d&&d.error?': '+d.error:''),'⚠'); return; }
  const rec=d.board; rec._refreshedAt=new Date().toISOString();
  applyBoardRecord(rec);
  const cache=LS.refreshed; cache[bid]=rec; LS.refreshed=cache;
  // drop local queued events now mirrored from Infinity (synced + their item is in the fresh pull)
  const liveItems=new Set((rec.events||[]).map(e=>e.item).filter(Boolean));
  const kept=LS.local.filter(e=>!(e.board===bid && e.synced && e.infItemId && liveItems.has(e.infItemId)));
  if(kept.length!==LS.local.length){ LS.local=kept; pushState(true); } // mirror the trim to the shared queue
  toast(`${b.name} refreshed — ${(rec.drivers||[]).length} drivers, ${(rec.events||[]).length} events`);
  if(screen==='entry'&&ctx.board===bid){ b._rosterLoaded=false; }
  render();
}

// Infinity Long Text renders Markdown; a bare URL stays plain text. Wrap each URL as a [url](url)
// markdown link so it's clickable. Idempotent: first collapse any existing [url](url) back to bare,
// then re-wrap — so re-saving an edited note never double-wraps. Local state keeps the clean URL.
function linkifyNotes(text){
  if(!text) return text;
  const t=String(text).replace(/\[(https?:\/\/[^\]\s]+)\]\((https?:\/\/[^)\s]+)\)/g,'$2');
  return t.replace(/\bhttps?:\/\/[^\s<>()\]]+/g, m=>'['+m+']('+m+')');
}
// pull bare URLs out of a note (collapsing any [url](url) markdown first), de-duped, order preserved
function extractUrls(text){
  if(!text) return [];
  const t=String(text).replace(/\[(https?:\/\/[^\]\s]+)\]\((https?:\/\/[^)\s]+)\)/g,'$2');
  const out=[], seen=new Set();
  (t.match(/\bhttps?:\/\/[^\s<>()\]]+/g)||[]).forEach(u=>{ if(!seen.has(u)){ seen.add(u); out.push(u); } });
  return out;
}
// build the value for Infinity's "links" attribute type: [{url,text}] — what renders clickable in the board view
function linkValues(text){
  const urls=extractUrls(text);
  return urls.map((u,i)=>({url:u,text:urls.length>1?('Video '+(i+1)):'Watch video'}));
}
// pull the live roster for a write-back board so the picker reflects Infinity (incl. app-added drivers)
async function loadRoster(bid){
  const wb=wbFor(bid), b=boardById(bid); if(!wb||!b) return;
  b._rosterLoaded=true;
  try{
    const r=await fetch(API_BASE+'/items?board='+bid+'&folder_id='+wb.roster_folder,{headers:{'X-App-Key':APP_KEY}});
    const d=await r.json();
    const drivers=(d.items||[]).map(it=>{ let nm=''; (it.values||[]).forEach(v=>{ if(v.attribute_id===wb.name_attr) nm=v.data; });
      return {id:it.id,name:nm}; }).filter(x=>x.name);
    if(drivers.length){ b.drivers=drivers; if(screen==='entry'&&ctx.board===bid) viewEntry(); }
  }catch(e){ b._rosterLoaded=false; console.error('roster load failed',e); }
}
// write one event back to Infinity: create the Camera Management item, then link the driver reference
async function pushEventBack(ev,opts){
  const wb=wbFor(ev.board); if(!wb) return false;
  const quiet=opts&&opts.quiet;
  const stamp=(patch)=>{ const arr=LS.local, i=arr.findIndex(x=>x.id===ev.id); if(i>=0){ Object.assign(arr[i],patch); LS.local=arr; pushState(true); } };
  try{
    // retry-safe: if the item was already created on a prior attempt, skip creation and resume at the driver link
    let itemId=ev.infItemId;
    if(!itemId){
      const values=[];
      const blab=wb.behavior_labels[ev.behavior]; if(blab) values.push({attribute_id:wb.behavior_attr,data:[blab]});
      const clab=wb.coaching_labels[ev.coaching]; if(clab) values.push({attribute_id:wb.coaching_attr,data:[clab]});
      if(ev.date) values.push({attribute_id:wb.date_attr,data:ev.date});
      if(ev.reviewed) values.push({attribute_id:wb.reviewed_attr,data:ev.reviewed});
      if(ev.notes) values.push({attribute_id:wb.notes_attr,data:linkifyNotes(ev.notes)});
      if(wb.link_attr){ const lv=linkValues(ev.notes); if(lv.length) values.push({attribute_id:wb.link_attr,data:lv}); }
      // driver assignment by board type: label option / text value ride on the item itself; reference is linked after create (below)
      const dmode=wb.driver_type||'reference';
      if(dmode==='label' && ev.driverId) values.push({attribute_id:wb.driver_attr,data:[ev.driverId]});
      else if(dmode==='text' && ev.driver) values.push({attribute_id:wb.driver_attr,data:ev.driver});
      // reference board: also stamp the driver NAME into the "Driver Name" text
      // shadow so the dashboard can read it back (the API can't read the ref off
      // the event). The roster reference itself is linked after create, below.
      if(dmode==='reference' && wb.driver_name_attr && ev.driver) values.push({attribute_id:wb.driver_name_attr,data:ev.driver});
      const res=await apiPost('/item',{board:ev.board,folder_id:wb.cam_folder,values});
      if(!res.ok||!(res.item&&res.item.id)) throw new Error('item '+(res.status||'')+' '+JSON.stringify(res.item||res.error||''));
      itemId=res.item.id;
      stamp({infItemId:itemId}); // record immediately so a later failure can't duplicate the item
    }
    if((wb.driver_type||'reference')==='reference' && ev.driverId){
      const rf=await apiPost('/reference',{board:ev.board,attribute_id:wb.driver_ref_attr,from_item_id:itemId,to_item_id:ev.driverId});
      if(!rf.ok) throw new Error('reference '+(rf.status||''));
    }
    stamp({synced:true,infItemId:itemId,syncError:null});
    markEntered(itemId); // remember this is one of OUR events so the ✓ survives the refresh-prune
    if(!quiet) toast('Wrote event to Infinity — '+ev.driver);
    if(screen==='entry'&&ctx.board===ev.board) refreshEntryPanels(ev.board);
    return true;
  }catch(e){
    stamp({syncError:String(e.message||e)});
    if(!quiet) toast('Infinity write failed — saved locally','⚠');
    console.error('event write-back failed',e);
    return false;
  }
}
// push any locally-queued events for boards that are now live (e.g. saved before rollout). Retry-safe.
async function flushQueued(opts){
  const pending=LS.local.filter(e=>!e.synced && wbFor(e.board));
  if(!pending.length){ if(opts&&opts.announce) toast('No queued events to push'); return; }
  toast('Pushing '+pending.length+' queued event'+(pending.length>1?'s':'')+'…');
  let ok=0;
  for(const ev of pending){ if(await pushEventBack(ev,{quiet:true})) ok++; }
  const failed=pending.length-ok;
  toast(`Pushed ${ok} to Infinity`+(failed?` — ${failed} failed, still queued ⚠`:''), failed?'⚠':'✓');
  render();
}
// create a new roster item in Infinity and select it
async function pushDriverBack(bid,name){
  const wb=wbFor(bid); if(!wb) return;
  const dmode=wb.driver_type||'reference';
  // text-driver board: the name is written straight onto each event — no Infinity object to create
  if(dmode==='text'){
    const b=boardById(bid); if(b){ b.drivers=b.drivers||[]; b.drivers.push({id:name,name}); }
    ctx.driver={name,id:name};
    toast('Driver added: '+name); viewEntry(); return;
  }
  // label-driver board: create the option on the driver attribute in Infinity, then pick it
  if(dmode==='label'){
    toast('Adding '+name+'…');
    try{
      const res=await apiPost('/label',{board:bid,attribute_id:wb.driver_attr,name});
      if(!res.ok||!res.id) throw new Error('label '+(res.status||''));
      const b=boardById(bid); if(b){ b.drivers=b.drivers||[]; if(!b.drivers.some(d=>d.id===res.id)) b.drivers.push({id:res.id,name}); }
      ctx.driver={name,id:res.id};
      toast(res.existed?('Driver already existed — selected: '+name):('Driver added to Infinity: '+name)); viewEntry();
    }catch(e){ toast('Could not add driver to Infinity','⚠'); console.error('label driver add failed',e); }
    return;
  }
  toast('Adding '+name+'…');
  try{
    const res=await apiPost('/item',{board:bid,folder_id:wb.roster_folder,values:[{attribute_id:wb.name_attr,data:name}]});
    if(!res.ok||!(res.item&&res.item.id)) throw new Error('roster '+(res.status||''));
    const b=boardById(bid); if(b){ b.drivers=b.drivers||[]; b.drivers.push({id:res.item.id,name}); }
    ctx.driver={name,id:res.item.id};
    toast('Driver added to Infinity: '+name); viewEntry();
  }catch(e){ toast('Could not add driver to Infinity','⚠'); console.error('driver write-back failed',e); }
}
function autoCoaching(){
  const beh=document.getElementById('evBehavior'), co=document.getElementById('evCoaching'), note=document.getElementById('coachAuto');
  if(!beh||!co) return;
  const bid=ctx.board, dn=ctx.driver&&ctx.driver.name;
  const asOf=(document.getElementById('evDate')||{}).value||today();
  // camera faults (Camera Exception) lock to System Alert — a hardware issue, not a coachable driver behavior
  if(AUTO_COACH[beh.value]){ const v=AUTO_COACH[beh.value]; co.value=v; co.dataset.auto='1'; co.disabled=true;
    if(note) note.textContent='Locked to '+v+' — '+beh.value+' is a camera fault, not a driver behavior. Change the behavior to unlock this field.'; return; }
  // auto-Critical behaviors notify every time, so they're always Critical Event and never escalate to Face to Face (excluded from trend logic)
  if(AUTO_CRITICAL.includes(beh.value)){ co.value='Critical Event'; co.dataset.auto='1'; co.disabled=true;
    if(note) note.textContent='Locked to Critical Event — '+beh.value+' is always a critical event. Change the behavior to unlock this field.'; return; }
  co.disabled=false; // re-open the field for any non-critical behavior
  const ti = dn ? trendInfo(bid,dn,beh.value,asOf) : null;
  if(ti&&ti.enabled&&ti.triggered){ co.value='Face to Face'; co.dataset.auto='1';
    if(note) note.textContent='Auto-set to Face to Face — trend threshold met ('+ti.count+' in '+ti.days+' days).'; }
  else { if(co.dataset.auto==='1') co.value=''; co.dataset.auto=''; if(note) note.textContent=''; }
}

// merged events for a board (infinity mirror + local entries).
// Each event carries: itemId (Infinity item id, if any), ours (WE entered it and
// it's in Infinity → green ✓) and editable (ours AND this board writes back to
// Infinity → can be opened & changed).
function eventsFor(id){
  const b=boardById(id); if(!b) return [];
  const wb=!!wbFor(id);
  const enteredSet=new Set(LS.entered);
  const inf=(b.events||[]).map(e=>({...e,board:id,source:'infinity',itemId:e.item||null}));
  const loc=LS.local.filter(e=>e.board===id).map(e=>({...e,source:'local',itemId:e.infItemId||null}));
  return [...loc,...inf].map(e=>{
    const ours = !!(e.itemId && (enteredSet.has(e.itemId) || (e.source==='local'&&e.synced)));
    return {...e, ours, editable: ours && wb};
  });
}
function allEvents(){ return visibleBoards().flatMap(b=>eventsFor(b.board)); }
function behaviorsFor(id){ const b=boardById(id); return (b&&b.behaviors&&b.behaviors.length)?b.behaviors:ENTRY_BEHAVIORS; }
function driversFor(id){
  const b=boardById(id);
  const base=(b&&b.drivers)||[];
  const added=LS.drivers.filter(d=>d.board===id).map(d=>({id:d.id,name:d.name,pending:true}));
  const seen=new Set(base.map(d=>d.name.toLowerCase()));
  const merged=[...base];
  added.forEach(d=>{ if(!seen.has(d.name.toLowerCase())){ seen.add(d.name.toLowerCase()); merged.push(d); } });
  // include any driver that appears in events but isn't on the roster, so their
  // history/trend is always reachable even if the Infinity roster is incomplete
  eventsFor(id).forEach(e=>{ const nm=e&&e.driver; if(nm && nm!=='OPEN' && !seen.has(nm.toLowerCase())){ seen.add(nm.toLowerCase()); merged.push({id:null,name:nm,fromEvents:true}); } });
  return merged.sort((a,b)=>a.name.localeCompare(b.name));
}

const fmtDate = d => d||'';
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// month + day only, for the entry-form panels (e.g. "2026-06-17" -> "Jun 17")
function mdOnly(d){ const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(d||''); return m?`${MON[+m[2]-1]} ${+m[3]}`:(d||''); }
function daysAgo(n){ const t=new Date(); t.setDate(t.getDate()-n); return t.toISOString().slice(0,10); }
const today = ()=> new Date().toISOString().slice(0,10);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg,icon){ const t=document.getElementById('toast'); t.textContent=(icon||'✓')+' '+msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function ordinal(n){ const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function dateMinus(dateStr,n){ const t=new Date((dateStr||today())+'T00:00:00'); t.setDate(t.getDate()-n); return t.toISOString().slice(0,10); }

// trend rule per customer: defaults 3 events / 30 days; trendDays 0 = off
function trendCfg(id){ const st=settingsFor(id);
  return { days: st.trendDays!=null?+st.trendDays:30, count: st.trendCount!=null?+st.trendCount:3 }; }
function trendInfo(bid,driverName,behavior,asOf){
  const {days,count}=trendCfg(bid);
  if(!days) return {enabled:false,days,count};
  const cut=dateMinus(asOf,days);
  const tk=trendKey(behavior);
  const prior=eventsFor(bid).filter(e=> e.driver===driverName && trendKey(e.behavior)===tk
        && (e.date||'')>=cut && (e.date||'')<=asOf);
  const nth=prior.length+1;            // including the event being entered
  return {enabled:true,days,count,prior,nth,triggered:nth>=count,grouped:tk!==(behavior||'')}; }

// read an uploaded image file, downscale it to keep localStorage small, store as a data URL
function logoUpload(id,input){
  const f=input.files&&input.files[0]; if(!f)return;
  if(!/^image\//.test(f.type)){ toast('Pick an image file'); return; }
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=240, scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      // PNG preserves transparency for logos; falls back fine for photos
      let url; try{ url=c.toDataURL('image/png'); }catch(e){ url=r.result; }
      approveLogo(id,url);
    };
    img.onerror=()=>{ toast('Could not read that image'); };
    img.src=r.result;
  };
  r.onerror=()=>{ toast('Could not read that file'); };
  r.readAsDataURL(f);
}

/* ---------- check Infinity for new / deleted boards (on demand only) ---------- */
// Normalize a board name for cross-id matching: lowercase, drop the common
// camera/accident board-name suffixes, collapse punctuation.
function normName(n){
  return (n||'').toLowerCase()
    .replace(/\b(camera management and accident tracking|camera and accident board|camera management|accident tracking)\b/g,'')
    .replace(/[^a-z0-9]+/g,' ').trim();
}
async function checkInfinity(){
  toast('Checking Infinity…');
  let d;
  try{
    const r=await fetch(API_BASE+'/boards',{headers:{'X-App-Key':APP_KEY}});
    d=await r.json();
  }catch(e){ toast('Could not reach the server'); return; }
  if(!d||!d.ok||!Array.isArray(d.boards)){ toast('Infinity check failed'); return; }
  const liveById={}; d.boards.forEach(b=>liveById[b.id]=b);
  // Match by id AND by normalized name — a board whose Infinity id changed
  // (e.g. a migrated/cloned board) keeps the same name, so name-matching stops
  // it from falsely showing as both "new" and "deleted".
  const known=new Set(SEED.boards.map(b=>b.board));
  const knownNames=new Set(SEED.boards.map(b=>normName(b.name)));
  const liveNames=new Set(d.boards.map(b=>normName(b.name)));
  const added=d.boards.filter(b=>!known.has(b.id)&&!knownNames.has(normName(b.name)));   // in Infinity, not in dashboard
  const removed=SEED.boards.filter(b=>!liveById[b.board]&&!liveNames.has(normName(b.name))); // in dashboard, gone from Infinity
  const lblStyle='display:flex;align-items:center;gap:8px;cursor:pointer;padding:3px 0';
  const cbStyle='width:auto;flex:none;margin:0';
  const addList=added.length
    ? added.map(b=>`<li><label style="${lblStyle}"><input type="checkbox" data-add="${b.id}" data-add-name="${esc(b.name)}" data-add-ws="${b.ws}" style="${cbStyle}"> <span><b>${esc(b.name)}</b></span></label></li>`).join('')
    : '<li class="faint">None — every Infinity board is already on the dashboard.</li>';
  const remList=removed.length
    ? removed.map(b=>`<li><label style="${lblStyle}"><input type="checkbox" checked data-rm="${b.board}" style="${cbStyle}"> <span><b>${esc(b.name)}</b></span></label></li>`).join('')
    : '<li class="faint">None — every dashboard board was found in Infinity.</li>';
  openModal(`
    <h2>Infinity check</h2>
    <div class="sub">Live: ${d.boards.length} boards in Infinity.</div>
    <h3 style="margin:16px 0 4px">Not in the dashboard (${added.length})</h3>
    <div class="sub">These exist in Infinity but aren't on your dashboard right now — including any you've taken off. Check the ones you want and hit <b>Add checked boards</b> to bring them back; their drivers &amp; events pull in live from Infinity on the spot.</div>
    <ul style="margin:8px 0;list-style:none;padding-left:0">${addList}</ul>
    ${added.length?`<div style="margin:-2px 0 6px"><button class="sm primary" id="addBoardsBtn" onclick="addCheckedBoards()">Add checked boards</button></div>`:''}
    <h3 style="margin:16px 0 4px">On the dashboard but not found in Infinity (${removed.length})</h3>
    <div class="sub">These are on your dashboard but the API couldn't find them — deleted, renamed, or in a workspace it can't read. Checked ones get hidden from the dashboard (they stay in Infinity).</div>
    <ul style="margin:8px 0;list-style:none;padding-left:0">${remList}</ul>
    <div class="modal-foot">
      <button onclick="closeModal()">Close</button>
      ${removed.length?`<button class="primary" onclick="applyInfinityRemovals()">Hide checked</button>`:''}
    </div>`);
}
// Pull each checked board live from Infinity (drivers + events) and merge it
// into the dashboard on the spot — no queue, no waiting on a reseed.
async function addCheckedBoards(){
  const picked=[...document.querySelectorAll('input[data-add]:checked')].map(c=>({
    id:c.getAttribute('data-add'), name:c.getAttribute('data-add-name'), ws:c.getAttribute('data-add-ws')}));
  if(!picked.length){ toast('Check the boards you want to add first','⚠'); return; }
  const btn=document.getElementById('addBoardsBtn');
  if(btn){ btn.disabled=true; }
  const cache=LS.refreshed; let ok=0, fail=0;
  for(let i=0;i<picked.length;i++){
    const p=picked[i];
    if(btn) btn.textContent=`Adding ${i+1}/${picked.length}…`;
    try{
      const u=API_BASE+'/board-data?board='+encodeURIComponent(p.id)
        +'&ws='+encodeURIComponent(p.ws||'')+'&name='+encodeURIComponent(p.name||'');
      const r=await fetch(u,{headers:{'X-App-Key':APP_KEY}});
      const d=await r.json();
      if(!d||!d.ok||!d.board) throw new Error((d&&d.error)||'pull failed');
      const rec=d.board; rec._refreshedAt=new Date().toISOString();
      applyBoardRecord(rec);          // adds it to SEED.boards if new
      cache[p.id]=rec; ok++;          // persist so it survives a reload
    }catch(e){ console.error('add board failed',p,e); fail++; }
  }
  LS.refreshed=cache;
  toast(`Added ${ok} board${ok===1?'':'s'} live`+(fail?` · ${fail} couldn't be pulled`:''), fail?'⚠':'✓');
  closeModal(); render();
}

  closeModal(); render();
}

//   green ✓  = an event WE logged that's confirmed in Infinity (editable)

function evBadge(e){

  if(e.source==='local'&&!e.synced) return ' <span class="pill gray">queued</span>';

}
function evRowAttrs(e){

    ? ` class="ev-edit" style="cursor:pointer" title="Click to edit this event and update Infinity" onclick="editEvent('${e.board}','${e.itemId}')"`

// right-hand panel on the entry form: driver history + live trend banner, or recent events when no driver picked
function refreshEntryPanels(bid){
  const aside=document.getElementById('entryAside'); if(!aside) return;

  if(ctx.driver && ctx.driver.name){

      html+=`<div class="trend-alert ok" style="background:#f1f3f8;border-color:var(--line);color:var(--muted)">Trend tracking is off for this customer.</div>`;
    } else if(behavior && AUTO_CRITICAL.includes(behavior)){
      html+=`<div class="trend-alert ok"><b>${esc(behavior)}</b> is always a Critical Event — it notifies every time, so it never escalates to a face-to-face.</div>`;
    } else if(behavior){
      const blabel = ti.grouped ? 'driver distraction (phone + cab)' : '“'+esc(behavior)+'”';
      const grpNote = ti.grouped ? ` <span class="faint">Phone &amp; cab distraction count together.</span>` : '';
      html+= ti.triggered
        ? `<div class="trend-alert hit"><b>Face-to-face needed.</b> This is the <b>${ordinal(ti.nth)}</b> ${blabel} event in ${ti.days} days (threshold ${ti.count}). Coaching needed is auto-set to <b>Face to Face</b> — change it if you disagree.${grpNote}</div>`
        : `<div class="trend-alert ok">This is the <b>${ordinal(ti.nth)}</b> ${blabel} event in ${ti.days} days. Face-to-face needed at ${ti.count}.${grpNote}</div>`;
      // red alert under the coaching-needed dropdown when threshold met
      if(ti.triggered && alertBox){
        alertBox.innerHTML=`<div class="f2f-alert">⚠ Face-to-face engagement needed — ${ordinal(ti.nth)} ${ti.grouped?'driver distraction (phone + cab)':esc(behavior)} event in ${ti.days} days (threshold ${ti.count}).</div>`;
      }
    }
    // driver history limited to the trend-day window, ordered by behavior
    const histAll=eventsFor(bid).filter(e=>e.driver===dn);
    const cut = cfg.days ? dateMinus(asOf,cfg.days) : null;
    // most-recent first (newest date at the top)
    const hist=(cut ? histAll.filter(e=>(e.date||'')>=cut && (e.date||'')<=asOf) : histAll)
      .slice().sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (a.behavior||'').localeCompare(b.behavior||''));
    const windowLbl = cfg.days ? `last ${cfg.days} days` : 'all time';
    html+=`<div class="pad" style="border-bottom:1px solid var(--line);font-weight:650">${esc(dn)} · events by behavior <span class="faint">(${windowLbl} · ${hist.length})</span></div>`;

        hist.map(e=>`<tr${evRowAttrs(e)}><td><b>${esc(e.behavior||'')}</b>${evBadge(e)}</td>
          <td>${e.coaching?`<span class="pill coach">${esc(e.coaching)}</span>`:'<span class="faint">—</span>'}</td>
          <td class="muted">${esc(mdOnly(e.date))}</td></tr>`).join('')+
        `</tbody></table>`
      : `<div class="empty-state">No events for this driver in the ${windowLbl}</div>`;
  } else {
    const recent=eventsFor(bid).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,12);
    html+=`<div class="pad" style="border-bottom:1px solid var(--line);font-weight:650">Recent events · ${esc(b.name||'')}</div>`;
    html+= recent.length
      ? `<table><thead><tr><th>Driver</th><th>Behavior</th><th>Coaching</th><th>Date</th></tr></thead><tbody>`+
        recent.map(e=>`<tr${evRowAttrs(e)}><td>${esc(e.driver||'—')}${evBadge(e)}</td><td>${esc(e.behavior||'')}</td>
          <td>${e.coaching?`<span class="pill coach">${esc(e.coaching)}</span>`:'<span class="faint">—</span>'}</td>
          <td class="muted">${esc(mdOnly(e.date))}</td></tr>`).join('')+
        `</tbody></table>`
      : `<div class="empty-state">No events yet</div>`;
  }
  aside.innerHTML=html;
}

/* ---------- edit an already-entered event (green ✓) and push the change to Infinity ---------- */
function editEvent(bid,itemId){
  const ev=eventsFor(bid).find(e=>e.itemId===itemId);
  if(!ev){ toast('Could not find that event'); return; }
  if(!ev.editable){ toast('This event isn’t live for editing yet','⚠'); return; }
  const b=boardById(bid)||{};
  const bopts=ENTRY_BEHAVIORS.map(x=>`<option ${x===ev.behavior?'selected':''}>${esc(x)}</option>`).join('');
  const copts=COACHING.slice().sort((a,b)=>a.localeCompare(b)).map(x=>`<option ${x===ev.coaching?'selected':''}>${esc(x)}</option>`).join('');
  openModal(`
    <h2>Edit event</h2>
    <div class="sub">${esc(b.name||'')} · <b>${esc(ev.driver||'—')}</b> — changes are written straight back to Infinity.</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:4px">
      <div class="field" style="margin:0"><label class="f">Camera event date</label><input type="date" id="edDate" value="${esc(ev.date||'')}" style="width:160px"></div>
      <div class="field" style="margin:0"><label class="f">Date reviewed</label><input type="date" id="edReviewed" value="${esc(ev.reviewed||'')}" style="width:160px"></div>
    </div>
    <div class="field"><label class="f">Behavior observed</label><select id="edBehavior"><option value="">— select a behavior —</option>${bopts}</select></div>
    <div class="field"><label class="f">Coaching needed</label><select id="edCoaching"><option value="">— none —</option>${copts}</select></div>
    <div class="field"><label class="f">Notes</label><textarea id="edNotes" rows="3" placeholder="Optional context — paste a link if needed…">${esc(ev.notes||'')}</textarea></div>
    <div class="modal-foot" style="justify-content:space-between">
      <button onclick="confirmDeleteEvent('${bid}','${itemId}')" style="background:var(--red);border-color:var(--red);color:#fff">Delete event</button>
      <div style="display:flex;gap:10px">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="saveEventEdit('${bid}','${itemId}')">Save changes</button>
      </div>
    </div>`);
}
// Two-step delete: confirm first (entered-in-error recovery), then remove from
// Infinity AND scrub every local trace so it can't reappear on reload/refresh.
function confirmDeleteEvent(bid,itemId){
  const ev=eventsFor(bid).find(e=>e.itemId===itemId);
  const b=boardById(bid)||{};
  const who=ev&&ev.driver?esc(ev.driver):'this driver';
  const when=ev&&ev.date?esc(mdOnly(ev.date)):'';
  const beh=ev&&ev.behavior?esc(ev.behavior):'event';
  openModal(`
    <h2>Delete this event?</h2>
    <div class="sub">${esc(b.name||'')} · <b>${who}</b></div>
    <div class="warn" style="background:#fdecec;border-color:#f3c0c0;color:#a12020;margin-bottom:16px">
      Permanently deletes the <b>${beh}</b> event${when?` from <b>${when}</b>`:''} from Infinity. This can’t be undone.
    </div>
    <div class="modal-foot" style="justify-content:space-between">
      <button onclick="editEvent('${bid}','${itemId}')">← Back</button>
      <button onclick="deleteEventNow('${bid}','${itemId}')" style="background:var(--red);border-color:var(--red);color:#fff">Delete event</button>
    </div>`);
}
async function deleteEventNow(bid,itemId){
  const wb=wbFor(bid);
  if(!wb){ toast('This board isn’t live for write-back','⚠'); return; }
  closeModal();
  toast('Deleting event in Infinity…');
  let res;
  try{ res=await apiDel('/item',{board:bid,item_id:itemId}); }
  catch(e){ console.error('event delete failed',e); }
  // Only scrub locally if Infinity actually deleted it — otherwise a refresh would
  // re-pull it and it'd come back as a confusing non-editable zombie. Keep + let retry.
  if(!res||!res.ok){ toast('Infinity delete failed — event kept, try again','⚠'); return; }
  removeEventLocally(bid,itemId);
  toast('Event deleted ✓');
  if(screen==='entry'&&ctx.board===bid) refreshEntryPanels(bid);
  render();
}
// Remove an event from every place we hold it: the local queue, the entered-ids
// set (green ✓ / editability), the in-memory board, and the persisted refresh cache.
function removeEventLocally(bid,itemId){
  LS.local=LS.local.filter(e=>!(e.board===bid && e.infItemId===itemId));
  LS.entered=LS.entered.filter(id=>id!==itemId);
  const b=boardById(bid); if(b&&Array.isArray(b.events)) b.events=b.events.filter(e=>e.item!==itemId);
  const cache=LS.refreshed, rec=cache[bid];
  if(rec&&Array.isArray(rec.events)){ rec.events=rec.events.filter(e=>e.item!==itemId); cache[bid]=rec; LS.refreshed=cache; }
  pushState(true);
}
function saveEventEdit(bid,itemId){
  const beh=document.getElementById('edBehavior').value;
  const co=document.getElementById('edCoaching').value;
  const date=document.getElementById('edDate').value;
  const reviewed=document.getElementById('edReviewed').value;
  const notes=document.getElementById('edNotes').value;
  const need=[[date,'edDate','Set the camera event date'],[reviewed,'edReviewed','Set the date reviewed'],
              [beh,'edBehavior','Pick the behavior observed'],[co,'edCoaching','Pick the coaching needed']];
  for(const [val,id,msg] of need){ if(!val){ toast(msg); const el=document.getElementById(id); if(el)el.focus(); return; } }
  const patch={behavior:beh,coaching:co,date,reviewed};
  if(notes) patch.notes=notes; // only set notes when non-empty so we never blank an existing note we didn't load
  // reflect the change locally right away (whichever copy of the event we hold)
  const arr=LS.local, li=arr.findIndex(e=>e.infItemId===itemId);
  if(li>=0){ Object.assign(arr[li],patch); LS.local=arr; pushState(true); }
  const b=boardById(bid);
  if(b&&Array.isArray(b.events)){ const me=b.events.find(e=>e.item===itemId); if(me) Object.assign(me,patch); }
  closeModal();
  toast('Updating event in Infinity…');
  pushEventUpdate(bid,itemId,{behavior:beh,coaching:co,date,reviewed,notes});
}
// PUT the changed values to the existing Infinity item (driver/reference unchanged)
async function pushEventUpdate(bid,itemId,ev){
  const wb=wbFor(bid);
  if(!wb){ toast('This board isn’t live for write-back','⚠'); if(screen==='entry'&&ctx.board===bid) refreshEntryPanels(bid); return false; }
  try{
    const values=[];
    const blab=wb.behavior_labels[ev.behavior]; if(blab) values.push({attribute_id:wb.behavior_attr,data:[blab]});
    const clab=wb.coaching_labels[ev.coaching]; if(clab) values.push({attribute_id:wb.coaching_attr,data:[clab]});
    if(ev.date) values.push({attribute_id:wb.date_attr,data:ev.date});
    if(ev.reviewed) values.push({attribute_id:wb.reviewed_attr,data:ev.reviewed});
    if(ev.notes) values.push({attribute_id:wb.notes_attr,data:linkifyNotes(ev.notes)});
    if(wb.link_attr){ const lv=linkValues(ev.notes); if(lv.length) values.push({attribute_id:wb.link_attr,data:lv}); }
    const res=await apiPut('/item',{board:bid,item_id:itemId,values});
    if(!res.ok) throw new Error('update '+(res.status||''));
    toast('Event updated in Infinity ✓');
    if(screen==='entry'&&ctx.board===bid) refreshEntryPanels(bid);
    return true;
  }catch(e){
    toast('Infinity update failed — change saved locally','⚠');
    console.error('event update failed',e);
    if(screen==='entry'&&ctx.board===bid) refreshEntryPanels(bid);
    return false;
  }
}

// add a driver to this customer's roster — queues a write-back to Infinity in the board's format
function openAddDriver(bid){
  const b=boardById(bid)||{};
  const fmt = b.driver_type==='label'
    ? 'Added as a new <b>label</b> option on this board’s driver field.'
    : 'Added as a new <b>roster item</b> in this board’s Driver Roster.';
  openModal(`
    <h3 style="margin:0 0 4px">New driver — ${esc(b.name||'')}</h3>
    <div class="sub" style="margin-bottom:14px">${fmt}</div>
    <div class="field"><label class="f">Driver name</label>
      <input id="ndName" placeholder="First Last" autocomplete="off"
        onkeydown="if(event.key==='Enter')saveNewDriver('${bid}')"></div>
    <div class="warn" style="margin:4px 0 16px">Queued for write-back to Infinity (tagged <b>pending</b>) and usable in the picker right now.</div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveNewDriver('${bid}')">Add driver</button>
    </div>`);
  setTimeout(()=>{const n=document.getElementById('ndName'); if(n)n.focus();},50);
}
function saveNewDriver(bid){
  const name=(document.getElementById('ndName').value||'').trim();
  if(!name){ toast('Enter a name'); return; }
  const exists=driversFor(bid).some(d=>d.name.toLowerCase()===name.toLowerCase());
  if(exists){ toast('That driver already exists'); return; }
  const b=boardById(bid)||{};
  if(wbFor(bid)){ closeModal(); pushDriverBack(bid,name); return; } // live: create roster item in Infinity now
  const id='ND'+Date.now()+Math.floor(Math.random()*1000);
  const rec={ board:bid, id, name, pending:true, ts:Date.now(), synced:false,
    // everything the write-back needs to create it in the right place/format
    writeback:{ type:b.driver_type, roster_folder:b.roster_folder||null, driver_attr:b.driver_attr||null } };
  const arr=LS.drivers; arr.push(rec); LS.drivers=arr;
  ctx.driver={name,id};
  closeModal(); toast('Driver added: '+name); viewEntry();
}
function setupCombo(bid){
  const drivers=driversFor(bid);
  const combo=document.getElementById('combo'), input=document.getElementById('drvInput'), menu=document.getElementById('drvMenu');
  if(ctx.driver) input.value=ctx.driver.name;
  let hl=-1;
  function paint(){
    const raw=input.value.trim();
    // when a driver is already picked and the box still shows their name, show the full A–Z list so it's easy to switch
    const q=(ctx.driver && raw===ctx.driver.name) ? '' : raw.toLowerCase();
    const list=drivers.filter(d=>d.name.toLowerCase().includes(q)).slice(0,80);
    menu.innerHTML = list.length
      ? list.map((d,i)=>`<div class="opt ${i===hl?'hl':''}" data-name="${esc(d.name)}" data-id="${esc(d.id||'')}">${esc(d.name)}${d.pending?'<span class="tag">pending</span>':''}</div>`).join('')
      : `<div class="empty">No driver matches “${esc(input.value)}”</div>`;
    menu.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{ ctx.driver={name:o.dataset.name,id:o.dataset.id}; input.value=o.dataset.name; combo.classList.remove('open'); refreshEntryPanels(bid); });
  }
  input.onfocus=()=>{ combo.classList.add('open'); hl=-1; input.select(); paint(); };
  input.oninput=()=>{ const had=ctx.driver; ctx.driver=null; combo.classList.add('open'); hl=-1; paint(); if(had)refreshEntryPanels(bid); };
  input.onkeydown=e=>{
    const opts=menu.querySelectorAll('.opt');
    if(e.key==='ArrowDown'){hl=Math.min(hl+1,opts.length-1);paint();e.preventDefault();}
    else if(e.key==='ArrowUp'){hl=Math.max(hl-1,0);paint();e.preventDefault();}
    else if(e.key==='Enter'&&opts[hl]){opts[hl].click();e.preventDefault();}
    else if(e.key==='Escape'){combo.classList.remove('open');}
  };
  document.addEventListener('click',e=>{ if(!combo.contains(e.target)) combo.classList.remove('open'); });
}
function saveEntry(bid){
  if(!ctx.driver||!ctx.driver.name){ toast('Pick a driver first'); document.getElementById('drvInput').focus(); return; }
  const ev={ id:'L'+Date.now()+Math.floor(Math.random()*1000), board:bid,
    driver:ctx.driver.name, driverId:ctx.driver.id||null,
    date:document.getElementById('evDate').value, reviewed:document.getElementById('evReviewed').value,
    behavior:document.getElementById('evBehavior').value, coaching:document.getElementById('evCoaching').value,
    notes:document.getElementById('evNotes').value, ts:Date.now(), synced:false };
  // every field but Notes is required — block the save and point at the first empty one
  const need=[['date','evDate','Set the camera event date'],
              ['reviewed','evReviewed','Set the date reviewed'],
              ['behavior','evBehavior','Pick the behavior observed'],
              ['coaching','evCoaching','Pick the coaching needed']];
  for(const [key,id,msg] of need){ if(!ev[key]){ toast(msg); const el=document.getElementById(id); if(el) el.focus(); return; } }
  const arr=LS.local; arr.unshift(ev); LS.local=arr;
  pushState(true); // make the event durable server-side immediately, before any Infinity write
  if(wbFor(bid)){ toast('Saving event for '+ev.driver+'…'); pushEventBack(ev); }
  else { toast('Event saved for '+ev.driver); }
  ctx.driver=null; viewEntry();
}

/* ---------- screen 3: events by behavior ---------- */
function viewEvents(){
  ctx.board=ctx.board||'__all'; ctx.days=ctx.days||'30'; ctx.behavior=ctx.behavior||null;
  ctx.driverFilter=ctx.driverFilter||'__all';
  const boards=visibleBoards();
  const bopts=`<option value="__all">All customers</option>`+boards.map(x=>`<option value="${x.board}" ${x.board===ctx.board?'selected':''}>${esc(x.name)}</option>`).join('');
  const dopts=[['7','Last 7 days'],['14','Last 14 days'],['30','Last 30 days'],['60','Last 60 days'],['90','Last 90 days'],['all','All time']]
      .map(([v,l])=>`<option value="${v}" ${v===ctx.days?'selected':''}>${l}</option>`).join('');

  let evs = ctx.board==='__all'?allEvents():eventsFor(ctx.board);
  if(ctx.days!=='all'){ const cut=daysAgo(+ctx.days); evs=evs.filter(e=>(e.date||'')>=cut); }

  // driver filter — list drivers present in the current customer + date scope, A–Z; defaults to all
  const drvNames=[...new Set(evs.map(e=>e.driver).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  if(ctx.driverFilter!=='__all' && !drvNames.includes(ctx.driverFilter)) ctx.driverFilter='__all';
  const dvopts=`<option value="__all">All drivers</option>`+drvNames.map(n=>`<option value="${esc(n)}" ${n===ctx.driverFilter?'selected':''}>${esc(n)}</option>`).join('');
  if(ctx.driverFilter!=='__all'){ evs=evs.filter(e=>e.driver===ctx.driverFilter); }

  // count per behavior: standard 12 first, then any legacy behaviors present in the data
  const counts={};
  evs.forEach(e=>{ const b=e.behavior||'(none)'; counts[b]=(counts[b]||0)+1; });
  const legacy=Object.keys(counts).filter(b=>!ENTRY_BEHAVIORS.includes(b) && b!=='(none)').sort();
  const order=[...ENTRY_BEHAVIORS,...legacy];

  // the 3 behaviors with the most events get the gold accent outline
  const top3=order.map(b=>[b,counts[b]||0]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);

  const boxes=order.map(b=>{
    const n=counts[b]||0;
    return `<button class="behbox ${ctx.behavior===b?'active':''} ${top3.includes(b)?'top3':''} ${n?'':'zero'}" onclick="ctx.behavior=${JSON.stringify(b).replace(/"/g,'&quot;')};viewEvents()">
      <div class="n">${n}</div><div class="lbl">${esc(b)}</div></button>`;
  }).join('');

  // detail list for the selected behavior
  const showCust = ctx.board==='__all';
  let detail='';
  if(ctx.behavior){
    const rows=evs.filter(e=>(e.behavior||'(none)')===ctx.behavior)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    detail=`<div class="card">
      <div class="pad" style="border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:680">${esc(ctx.behavior)} <span class="faint">· ${rows.length} event${rows.length===1?'':'s'}</span></div>
        <button class="linkbtn" onclick="ctx.behavior=null;viewEvents()">✕ clear</button>
      </div>
      <table><thead><tr><th>Driver</th><th>Date</th><th>Coaching needed</th>${showCust?'<th>Customer</th>':''}<th></th></tr></thead><tbody>`+
      (rows.length?rows.map(e=>`<tr${evRowAttrs(e)}>
        <td><b>${esc(e.driver||'—')}</b></td>
        <td class="muted">${esc(e.date||'')}</td>
        <td>${e.coaching?`<span class="pill coach">${esc(e.coaching)}</span>`:'<span class="faint">—</span>'}</td>
        ${showCust?`<td class="muted">${esc((boardById(e.board)||{}).name||'')}</td>`:''}
        <td>${evBadge(e)}</td></tr>`).join('')
        :`<tr><td colspan="${showCust?5:4}" class="empty-state">No events</td></tr>`)+
      `</tbody></table></div>`;
  } else {
    // no behavior selected — show every event in scope, most-recent first (like Recent events on Data Entry)
    const rows=evs.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    detail=`<div class="card">
      <div class="pad" style="border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:680">All events <span class="faint">· ${rows.length} event${rows.length===1?'':'s'} · click a box above to filter by behavior</span></div>
      </div>
      <table><thead><tr><th>Driver</th><th>Behavior</th><th>Date</th><th>Coaching needed</th>${showCust?'<th>Customer</th>':''}<th></th></tr></thead><tbody>`+
      (rows.length?rows.map(e=>`<tr${evRowAttrs(e)}>
        <td><b>${esc(e.driver||'—')}</b></td>
        <td>${esc(e.behavior||'')}</td>
        <td class="muted">${esc(e.date||'')}</td>
        <td>${e.coaching?`<span class="pill coach">${esc(e.coaching)}</span>`:'<span class="faint">—</span>'}</td>
        ${showCust?`<td class="muted">${esc((boardById(e.board)||{}).name||'')}</td>`:''}
        <td>${evBadge(e)}</td></tr>`).join('')
        :`<tr><td colspan="${showCust?6:5}" class="empty-state">No events in range</td></tr>`)+
      `</tbody></table></div>`;
  }

  const custName = ctx.board==='__all'?'All customers':((boardById(ctx.board)||{}).name||'');
  document.getElementById('main').innerHTML=`
    <div class="topbar"><div>
      <h1>Events by Behavior</h1>
      <div class="sub">${custName} · ${evs.length} events in range</div>
    </div></div>
    <div class="filters">
      <div class="field"><label class="f">Customer</label><select onchange="ctx.board=this.value;ctx.driverFilter='__all';ctx.behavior=null;viewEvents()">${bopts}</select></div>
      <div class="field"><label class="f">Driver</label><select onchange="ctx.driverFilter=this.value;viewEvents()">${dvopts}</select></div>
      <div class="field"><label class="f">Date range</label><select onchange="ctx.days=this.value;viewEvents()">${dopts}</select></div>
    </div>
    <div class="behgrid">${boxes}</div>
    ${detail}`;
}

// seed the name-keyed logo store from any logos already set per-id, so boards
// whose logo predates this feature still reload after a remove/re-add.
function backfillLogos(){
  const s=LS.s, m={...(s._logos||{})}; let changed=false;
  for(const b of SEED.boards){
    const st=s[b.board]; if(!st||!st.logo) continue;
    const k=normName(b.name); if(!k||m[k]) continue;
    m[k]={logo:st.logo, logoZoom:st.logoZoom||1}; changed=true;
  }
  if(changed){ s._logos=m; LS.s=s; pushState(); }
}
backfillLogos();
render();
// pull shared settings + the shared event queue FIRST, then flush — so events
// queued on another machine are merged in before we push them to Infinity.
// ---- on-screen diagnostic: open camera-management-app.pages.dev/?debug=1 and screenshot it. No console needed. ----
async function showDiag(){
  let server={}; let ok=false;
  try{ const r=await fetch(API_BASE+'/state',{cache:'no-store'}); ok=r.ok; server=(await r.json()).data||{}; }catch(e){}
  const srvHidden=(server.settings&&server.settings._hidden)||[];
  const localHidden=[...hiddenSet()];
  const seedNames=SEED.boards.map(b=>b.name).sort();
  const scriptUrl=(document.querySelector('script[src*=seed]')||{}).src||'?';
  const cached=Object.keys(LS.refreshed||{});
  const verdict = !ok ? 'PROBLEM: this browser CANNOT reach the server (ad-blocker/VPN/offline). It is showing stale local data.'
    : (JSON.stringify(localHidden.slice().sort())!==JSON.stringify(srvHidden.slice().sort())
        ? 'PROBLEM: this browser\'s hidden-list disagrees with the server — sync has not applied. Local hidden='+JSON.stringify(localHidden)+' vs server='+JSON.stringify(srvHidden)
        : 'OK: this browser matches the server. Build='+BUILD_ID+', '+SEED.boards.length+' boards visible='+visibleBoards().length);
  const F='font:13px/1.5 monospace';
  const d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;background:#0b1220;color:#d7e2ff;z-index:99999;padding:24px;overflow:auto;'+F;
  d.innerHTML='<h2 style="color:#7fd1ff;margin:0 0 12px">DENvision diagnostic — screenshot this whole box and send to Johnny</h2>'
    +'<p style="color:#ffd27f;font-weight:bold">'+verdict+'</p>'
    +'<pre style="white-space:pre-wrap">'
    +'BUILD_ID (which HTML this browser runs): '+BUILD_ID+'\n'
    +'seed script URL loaded              : '+scriptUrl+'\n'
    +'SEED.generated (seed version)       : '+(SEED.generated||'?')+'\n'
    +'boards in seed / visible            : '+SEED.boards.length+' / '+visibleBoards().length+'\n'
    +'server reachable                    : '+ok+'\n'
    +'hidden list — this browser          : '+JSON.stringify(localHidden)+'\n'
    +'hidden list — server                : '+JSON.stringify(srvHidden)+'\n'
    +'cam_refreshed cached board ids      : '+JSON.stringify(cached)+'\n'
    +'\n--- visible board names ('+seedNames.length+') ---\n'+seedNames.join('\n')
    +'</pre><button onclick="this.parentNode.remove()" style="padding:8px 16px;'+F+'">close</button>';
  document.body.appendChild(d);
}
if(/[?&]debug=1/.test(location.search)) pullState().then(showDiag);
else pullState().then(()=>{ backfillLogos(); flushQueued(); });
